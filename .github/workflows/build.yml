name: builds

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Update Changelog"]
    types: [completed]

permissions: write-all

concurrency:
  group: build-phar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}

      - name: Resolve build version
        id: version
        run: |
          TAG="$(tr -d ' \t\r\n' < version.txt 2>/dev/null || true)"
          if [ -z "$TAG" ]; then
            TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo unreleased)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: dom, curl, libxml, mbstring, zip
          ini-values: error_reporting=E_ALL, phar.readonly=Off
          tools: composer:v2
          coverage: none

      - name: Install the dependencies
        run: composer install --prefer-dist --optimize-autoloader --no-interaction --no-progress --no-suggest --no-scripts --ansi -v --ignore-platform-req=ext-pcntl --ignore-platform-req=ext-posix --ignore-platform-req=ext-sockets

      - name: Execute build
        run: php jq app:build jq --build-version=${{ steps.version.outputs.tag }}

      - name: Commit changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Generate build
          branch: ${{ github.event_name == 'workflow_run' && 'main' || github.ref_name }}
